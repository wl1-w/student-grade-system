<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生成绩管理系统</title>
<style>
:root {
    --primary: #4A90D9; --success: #52C41A; --warning: #FA8C16; --danger: #FF4D4F;
    --bg: #f0f4f8; --card: #fff; --text: #2c3e50; --text-light: #7f8c8d;
    --border: #e8ecf1; --shadow: 0 1px 3px rgba(0,0,0,.06);
    --radius: 12px; --radius-sm: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#c8ccd0;border-radius:3px}

.header{
    background:linear-gradient(135deg,#2c3e50,#3A7BC8,#4A90D9,#6c5ce7);
    color:#fff;padding:0 24px;position:sticky;top:0;z-index:100
}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:54px}
.header-logo{font-size:1.15rem;font-weight:700}

.container{max-width:1100px;margin:0 auto;padding:20px 20px 32px}

/* 标签页 */
.tabs{
    display:flex;gap:4px;background:var(--card);border-radius:var(--radius);
    padding:5px;margin-bottom:20px;box-shadow:var(--shadow)
}
.tab-btn{
    flex:1;padding:10px 16px;border:none;background:transparent;border-radius:10px;
    cursor:pointer;font-size:.95rem;font-weight:600;color:var(--text-light);transition:.2s;
    display:flex;align-items:center;justify-content:center;gap:6px
}
.tab-btn.active{background:var(--primary);color:#fff}
.tab-btn:hover:not(.active){background:#f0f5fb;color:var(--primary)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* 卡片 */
.card{
    background:var(--card);border-radius:var(--radius);padding:22px 24px 20px;
    box-shadow:var(--shadow);border:1px solid var(--border)
}
.card-head{
    display:flex;align-items:center;gap:10px;margin-bottom:16px;
    padding-bottom:12px;border-bottom:1px solid var(--border)
}
.card-head h2{font-size:1rem;font-weight:700}

/* 表单 */
.form-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-field label{font-size:.72rem;font-weight:700;color:var(--text-light);text-transform:uppercase}
.form-field input{
    padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    font-size:.9rem;outline:none;background:#fafbfc;transition:.2s
}
.form-field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.12);background:#fff}
.form-field input::placeholder{color:#bcc0c5}
.form-field input.error{border-color:var(--danger)}
.form-hint{font-size:.72rem;color:var(--danger);min-height:16px}

/* 按钮 */
.btn{
    display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border:none;
    border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;cursor:pointer;
    color:#fff;transition:.2s;white-space:nowrap
}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;pointer-events:none;filter:none;transform:none}
.btn-blue{background:var(--primary)}.btn-green{background:var(--success)}
.btn-orange{background:var(--warning)}.btn-red{background:var(--danger)}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:5px 12px;font-size:.78rem;border-radius:6px}
.btn-lg{padding:10px 26px;font-size:.95rem}
.btn.loading .btn-text{display:none}
.btn .btn-loading-text{display:none}
.btn.loading .btn-loading-text{display:inline}
.btn.loading::before{
    content:'';display:inline-block;width:14px;height:14px;
    border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;
    border-radius:50%;animation:spin .55s linear infinite;margin-right:5px
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 表格 */
.table-wrap{overflow:auto;max-height:420px;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead{position:sticky;top:0;z-index:1}
th{
    padding:11px 14px;text-align:left;font-weight:700;font-size:.75rem;
    color:var(--text-light);text-transform:uppercase;background:#f8fafc;
    border-bottom:2px solid var(--border);white-space:nowrap
}
td{padding:10px 14px;border-top:1px solid #f0f2f5}
tbody tr:hover{background:#f5f9fd}
.seq{width:38px;text-align:center;color:var(--text-light);font-weight:600;font-size:.8rem}
.score-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-weight:700;font-size:.83rem}
.score-a{background:#e6f7e6;color:#2d8a2d}
.score-b{background:#fff7e6;color:#d48806}
.score-c{background:#fff1f0;color:#cf1322}
.actions{display:flex;gap:6px}
.empty-wrap{text-align:center;padding:40px 20px;color:#c0c4c8}
.empty-icon{font-size:3rem;margin-bottom:8px}

/* 统计卡片 */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.stat-item{
    border-radius:var(--radius);padding:20px 22px;color:#fff;display:flex;
    align-items:center;gap:14px;position:relative;overflow:hidden
}
.stat-item::after{
    content:'';position:absolute;width:90px;height:90px;background:rgba(255,255,255,.08);
    border-radius:50%;top:-20px;right:-20px
}
.stat-item.blue{background:linear-gradient(135deg,#4A90D9,#6c5ce7)}
.stat-item.orange{background:linear-gradient(135deg,#FA8C16,#f5576c)}
.stat-icon{font-size:2rem;position:relative;z-index:1}
.stat-body{position:relative;z-index:1}
.stat-body .lbl{font-size:.78rem;opacity:.85}
.stat-body .val{font-size:1.8rem;font-weight:800;line-height:1.1}
.stat-body .sub{font-size:.72rem;opacity:.7;margin-top:2px}

/* Toast */
.toast-wrap{position:fixed;top:66px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{
    display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:8px;
    font-weight:600;font-size:.88rem;box-shadow:0 6px 22px rgba(0,0,0,.15);
    pointer-events:auto;animation:toastIn .3s ease;max-width:380px
}
.toast-item.hide{animation:toastOut .22s ease forwards}
.toast-ok{background:#e6f7e6;color:#1b5e20;border-left:4px solid var(--success)}
.toast-err{background:#fff1f0;color:#b71c1c;border-left:4px solid var(--danger)}
.toast-info{background:#e6f0fa;color:#0d47a1;border-left:4px solid var(--primary)}
.toast-close{margin-left:auto;background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:.5;color:inherit}
.toast-close:hover{opacity:1}
@keyframes toastIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(50px)}}

/* 模态框 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{
    background:#fff;border-radius:var(--radius);padding:28px 30px;max-width:420px;
    width:92%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.2);animation:modalIn .25s ease
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-icon{font-size:2.8rem;margin-bottom:8px}
.modal-box h3{margin-bottom:4px;font-size:1.1rem}
.modal-desc{color:var(--text-light);margin-bottom:16px;font-size:.88rem}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-input{width:130px;padding:10px 12px;border:2px solid var(--primary);border-radius:var(--radius-sm);font-size:1.1rem;text-align:center;outline:none;margin:8px 0}
.modal-err{font-size:.75rem;color:var(--danger);min-height:18px}

/* 页脚 */
.footer{text-align:center;padding:16px 20px;color:var(--text-light);font-size:.78rem;border-top:1px solid var(--border)}

@media(max-width:768px){
    .container{padding:14px 10px 28px}
    .card{padding:18px}
    .form-row{flex-direction:column}
    .form-field{min-width:100%}
    .tab-btn{font-size:.82rem;padding:8px 10px}
}
</style>
</head>
<body>

<header class="header">
    <div class="header-inner"><div class="header-logo">📚 学生成绩管理系统</div></div>
</header>

<div class="toast-wrap" id="toast-wrap"></div>

<div class="container">

    <!-- 标签页 -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="p-add">➕ 添加成绩</button>
        <button class="tab-btn" data-tab="p-query">🔍 查询成绩</button>
        <button class="tab-btn" data-tab="p-stats">📊 课程统计</button>
    </div>

    <!-- 面板1：添加成绩 -->
    <div class="tab-panel active" id="p-add">
        <div class="card">
            <div class="card-head"><h2>新增成绩记录</h2></div>
            <div class="form-row">
                <div class="form-field">
                    <label>学号</label>
                    <input type="text" id="f-id" placeholder="如 2021001" maxlength="9" autofocus>
                    <div class="form-hint" id="fh-id"></div>
                </div>
                <div class="form-field">
                    <label>姓名</label>
                    <input type="text" id="f-name" placeholder="如 张三" maxlength="19">
                    <div class="form-hint" id="fh-name"></div>
                </div>
            </div>
            <div class="form-row" style="margin-top:4px">
                <div class="form-field">
                    <label>课程</label>
                    <input type="text" id="f-course" placeholder="如 C语言程序设计" maxlength="19">
                    <div class="form-hint" id="fh-course"></div>
                </div>
                <div class="form-field">
                    <label>分数 (0-100)</label>
                    <input type="number" id="f-score" placeholder="85" min="0" max="100" step="0.5">
                    <div class="form-hint" id="fh-score"></div>
                </div>
                <div class="form-field" style="justify-content:flex-end;flex:0 0 auto">
                    <button class="btn btn-blue btn-lg" id="btn-add">
                        <span class="btn-text">提交</span><span class="btn-loading-text">处理中</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 面板2：查询成绩（学号+姓名双路） -->
    <div class="tab-panel" id="p-query">
        <div class="card">
            <div class="card-head"><h2>成绩查询</h2></div>
            <div class="form-row">
                <div class="form-field" style="flex:1;">
                    <label>学号 / 姓名</label>
                    <input type="text" id="q-keyword" placeholder="输入学号或姓名查询">
                </div>
                <div class="form-field" style="justify-content:flex-end;flex:0 0 auto">
                    <button class="btn btn-green btn-lg" id="btn-query">
                        <span class="btn-text">🔎 查询</span><span class="btn-loading-text">处理中</span>
                    </button>
                </div>
            </div>
            <div id="query-area" style="margin-top:14px"></div>
        </div>
    </div>

    <!-- 面板3：课程统计 + 全表 -->
    <div class="tab-panel" id="p-stats">
        <div class="card">
            <div class="card-head"><h2>课程成绩统计</h2></div>
            <div class="form-row">
                <div class="form-field" style="max-width:280px">
                    <label>课程名称</label>
                    <input type="text" id="s-course" placeholder="输入课程名称查看统计与排名">
                </div>
                <div class="form-field" style="justify-content:flex-end;flex:0 0 auto">
                    <button class="btn btn-orange btn-lg" id="btn-stats">
                        <span class="btn-text">📈 统计分析</span><span class="btn-loading-text">处理中</span>
                    </button>
                </div>
            </div>
            <div id="stats-area" style="margin-top:12px"></div>
        </div>
    </div>

</div>

<footer class="footer">© 2026 学生成绩管理系统 &nbsp; 

<!-- 通用模态框 -->
<div class="modal-bg" id="modal">
    <div class="modal-box">
        <div class="modal-icon" id="mod-icon"></div>
        <h3 id="mod-title"></h3>
        <div id="mod-body"></div>
        <div class="modal-btns" id="mod-btns"></div>
    </div>
</div>

<script>
// 全局
const S={qtype:null,qval:null,pending:{}};
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const sCls=s=>s>=85?'score-a':s>=60?'score-b':'score-c';
const api=async(url,method='GET',body=null)=>{
    const o={method,headers:{'Content-Type':'application/json'}};
    if(body)o.body=JSON.stringify(body);
    return(await fetch(url,o)).json()
};

// 初始化
$('f-id').focus();

// 标签页
document.querySelectorAll('.tab-btn').forEach(b=>{
    b.onclick=function(){
        document.querySelectorAll('.tab-btn,.tab-panel').forEach(e=>e.classList.remove('active'));
        this.classList.add('active');
        $(this.dataset.tab).classList.add('active')
    }
});

// Toast
const toast=(msg,type='info')=>{
    const ic={ok:'✅',err:'❌',info:'ℹ️'};
    const el=document.createElement('div');
    el.className='toast-item toast-'+type;
    el.innerHTML=`<span>${ic[type]}</span><span>${msg}</span><button class="toast-close">×</button>`;
    el.querySelector('.toast-close').onclick=()=>{
        if(el._d)return;
        el._d=1;clearTimeout(el._t);
        el.classList.add('hide');
        setTimeout(()=>el.remove(),220)
    };
    $('toast-wrap').appendChild(el);
    el._t=setTimeout(()=>{if(!el._d)el.querySelector('.toast-close').click()},3000)
};

const loading=(btn,on)=>{btn.classList.toggle('loading',on);btn.disabled=on};

const hint=(f,msg)=>{
    const el=$('fh-'+f);if(el)el.textContent=msg||'';
    const inp=$('f-'+f);if(inp)inp.classList.toggle('error',!!msg)
};
const clearHints=()=>['id','name','course','score'].forEach(f=>hint(f,''));

// 渲染表格
const makeTable=(recs,acts)=>{
    if(!recs.length)return '<div class="empty-wrap"><div class="empty-icon">📭</div><p>暂无数据</p></div>';
    let h=`<div style="display:flex;justify-content:space-between;padding:8px 0 4px"><span style="color:var(--text-light);font-size:.85rem">共 <b style="color:var(--primary)">${recs.length}</b> 条</span></div><div class="table-wrap"><table><thead><tr><th class="seq">#</th><th>学号</th><th>姓名</th><th>课程</th><th>分数</th>${acts?'<th>操作</th>':''}</tr></thead><tbody>`;
    recs.forEach((r,i)=>{
        h+=`<tr><td class="seq">${i+1}</td><td>${esc(r.id)}</td><td>${esc(r.name)}</td><td>${esc(r.course)}</td><td><span class="score-tag ${sCls(r.score)}">${r.score}</span></td>`;
        if(acts)h+=`<td><div class="actions"><button class="btn btn-orange btn-sm" data-a="edit" data-id="${esc(r.id)}" data-course="${esc(r.course)}" data-score="${r.score}">✏️</button> <button class="btn btn-red btn-sm" data-a="del" data-id="${esc(r.id)}" data-course="${esc(r.course)}">🗑️</button></div></td>`;
        h+='</tr>'
    });
    return h+'</tbody></table></div>'
};

const bindActs=ct=>{
    ct.querySelectorAll('[data-a="edit"]').forEach(b=>b.onclick=()=>editM(b.dataset.id,b.dataset.course,+b.dataset.score));
    ct.querySelectorAll('[data-a="del"]').forEach(b=>b.onclick=()=>delM(b.dataset.id,b.dataset.course))
};

// 模态框
const openM=(icon,title,body,btns,onS)=>{
    $('mod-icon').textContent=icon;$('mod-title').textContent=title;
    $('mod-body').innerHTML=body;$('mod-btns').innerHTML=btns;
    $('modal').classList.add('show');if(onS)onS()
};
const closeM=()=>{$('modal').classList.remove('show');S.pending={}};
$('modal').onclick=e=>{if(e.target===$('modal'))closeM()};

// ===== 1. 添加 =====
const addG=async()=>{
    const btn=$('btn-add');
    const id=$('f-id').value.trim(),name=$('f-name').value.trim();
    const course=$('f-course').value.trim(),score=$('f-score').value;
    clearHints();let ok=true;
    if(!id){hint('id','请输入学号');ok=false}
    if(!name){hint('name','请输入姓名');ok=false}
    if(!course){hint('course','请输入课程名称');ok=false}
    const sn=parseFloat(score);
    if(score===''){hint('score','请输入分数');ok=false}
    else if(isNaN(sn)||sn<0||sn>100){hint('score','分数需在 0~100 之间');ok=false}
    if(!ok)return;
    loading(btn,true);
    try{
        const r=await api('/api/add','POST',{id,name,course,score:sn});
        if(r.code===200){toast(r.msg,'ok');['id','name','course','score'].forEach(f=>$('f-'+f).value='');$('f-id').focus();if(S.qtype)refQ()}
        else toast(r.msg,'err')
    }catch{toast('网络错误','err')}
    loading(btn,false)
};
$('btn-add').onclick=addG;

// ===== 2. 查询（纯数字=学号，其他=姓名） =====
const doQuery=async()=>{
    const btn=$('btn-query'),kw=$('q-keyword').value.trim();
    if(!kw)return toast('请输入学号或姓名','err');
    const byId=/^\d+$/.test(kw);
    S.qtype=byId?'id':'name';S.qval=kw;
    loading(btn,true);
    const a=$('query-area');
    try{
        const url=byId
            ?'/api/query?student_id='+encodeURIComponent(kw)
            :'/api/query_by_name?name='+encodeURIComponent(kw);
        const r=await api(url);
        if(r.code!==200){toast(r.msg,'err');a.innerHTML='';loading(btn,false);return}
        a.innerHTML=makeTable(r.data.records,true);bindActs(a);
        const label=byId?`学号「${esc(kw)}」`:`姓名「${esc(kw)}」`;
        toast(`${label} 共 ${r.data.count} 条`,r.data.count?'ok':'info')
    }catch{toast('网络错误','err')}
    loading(btn,false)
};
const refQ=async()=>{$('q-keyword').value=S.qval;await doQuery()};
$('btn-query').onclick=doQuery;

// ===== 3. 统计 =====
const statC=async()=>{
    const btn=$('btn-stats'),course=$('s-course').value.trim();
    if(!course)return toast('请输入课程名称','err');
    loading(btn,true);
    const a=$('stats-area');
    try{
        const[r1,r2]=await Promise.all([
            api('/api/stats?course='+encodeURIComponent(course)),
            api('/api/course_records?course='+encodeURIComponent(course))
        ]);
        if(r1.code!==200){toast(r1.msg,'err');a.innerHTML='';loading(btn,false);return}
        const d=r1.data;
        let h=`<div class="stat-cards">
            <div class="stat-item blue"><div class="stat-icon">📊</div><div class="stat-body"><div class="lbl">${esc(d.course)} · 平均分</div><div class="val">${d.average}</div><div class="sub">反映整体水平</div></div></div>
            <div class="stat-item orange"><div class="stat-icon">🏆</div><div class="stat-body"><div class="lbl">${esc(d.course)} · 最高分</div><div class="val">${d.max}</div><div class="sub">最佳成绩</div></div></div>
        </div>`;
        if(r2.code===200&&r2.data.records.length){
            h+=`<h3 style="font-size:.92rem;font-weight:700;margin-bottom:10px;color:var(--text-light)">📋 ${esc(course)} 全部学生成绩（按学号排序）</h3>`;
            h+=makeTable(r2.data.records,false)
        }
        a.innerHTML=h;toast(r1.msg,'ok')
    }catch{toast('网络错误','err')}
    loading(btn,false)
};
$('btn-stats').onclick=statC;

// ===== 4. 修改 =====
const editM=(id,course,oldS)=>{
    S.pending={id,course};
    openM('✏️','修改成绩',
        `<div class="modal-desc"><b>学号：</b>${esc(id)} &nbsp;|&nbsp; <b>课程：</b>${esc(course)}</div><input type="number" id="mod-score" class="modal-input" value="${oldS}" min="0" max="100" step="0.5"><div class="modal-err" id="mod-err"></div>`,
        `<button class="btn btn-outline" onclick="closeM()">取消</button><button class="btn btn-orange" id="btn-ed-ok"><span class="btn-text">确认修改</span><span class="btn-loading-text">处理中</span></button>`,
        ()=>{
            const inp=$('mod-score');setTimeout(()=>{inp.focus();inp.select()},60);
            inp.onkeydown=e=>{if(e.key==='Enter')$('btn-ed-ok').click()};
            $('btn-ed-ok').onclick=async function(){
                const v=parseFloat(inp.value);
                if(isNaN(v)||v<0||v>100){$('mod-err').textContent='分数须在 0~100 之间';return inp.focus()}
                $('mod-err').textContent='';loading(this,true);
                try{
                    const r=await api('/api/update','PUT',{id:S.pending.id,course:S.pending.course,score:v});
                    if(r.code===200){toast(r.msg,'ok');closeM();if(S.qtype)refQ()}
                    else toast(r.msg,'err')
                }catch{toast('网络错误','err')}
                loading(this,false)
            }
        }
    )
};

// ===== 5. 删除 =====
const delM=(id,course)=>{
    S.pending={id,course};
    openM('⚠️','确认删除',
        `<div class="modal-desc">确定删除以下记录？<br><br><b>学号：</b>${esc(id)}<br><b>课程：</b>${esc(course)}<br><br><span style="color:var(--danger)">此操作不可撤销！</span></div>`,
        `<button class="btn btn-outline" onclick="closeM()">取消</button><button class="btn btn-red" id="btn-dl-ok"><span class="btn-text">确认删除</span><span class="btn-loading-text">处理中</span></button>`,
        ()=>{
            $('btn-dl-ok').onclick=async function(){
                loading(this,true);
                try{
                    const r=await api('/api/delete','DELETE',{id:S.pending.id,course:S.pending.course});
                    if(r.code===200){toast(r.msg,'ok');closeM();if(S.qtype)refQ()}
                    else toast(r.msg,'err')
                }catch{toast('网络错误','err')}
                loading(this,false)
            }
        }
    )
};

// 键盘
document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeM();return}
    if(e.key==='Enter'&&e.target.tagName==='INPUT'&&!e.target.closest('#modal')){
        const p=e.target.closest('.tab-panel.active');if(!p)return;
        if(p.id==='p-add')addG();
        else if(p.id==='p-query')doQuery()
        else if(p.id==='p-stats')statC()
    }
});
</script>
</body>
